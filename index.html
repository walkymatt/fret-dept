<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar — Chords & Scales</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1>Guitar</h1>
    <p class="subtitle">Chords &amp; scales on the fretboard</p>
  </header>

  <!-- Control panel -->
  <section class="controls" aria-label="Controls">

    <!-- Mode -->
    <div class="control-group">
      <label for="sel-mode">Mode</label>
      <select id="sel-mode">
        <option value="chord">Chord</option>
        <option value="scale">Scale</option>
      </select>
    </div>

    <!-- Root note -->
    <div class="control-group">
      <label for="sel-root">Root note</label>
      <select id="sel-root"></select>
    </div>

    <!-- Chord selector (visible in chord mode) -->
    <div class="control-group" id="chord-row">
      <label for="sel-chord">Chord type</label>
      <select id="sel-chord"></select>
    </div>

    <!-- Scale selector (visible in scale mode) -->
    <div class="control-group" id="scale-row" style="display:none">
      <label for="sel-scale">Scale type</label>
      <select id="sel-scale"></select>
    </div>

    <!-- Tuning -->
    <div class="control-group">
      <label for="sel-tuning">Tuning</label>
      <select id="sel-tuning"></select>
    </div>

    <!-- Inversion / slash chord (chord mode only) -->
    <div class="control-group" id="inversion-row">
      <label for="sel-inversion">Inversion</label>
      <select id="sel-inversion"></select>
    </div>

  </section>

  <!-- Title -->
  <div class="display-title-wrap">
    <span id="display-title"></span>
  </div>

  <!-- Fretboard -->
  <div class="fretboard-card">
    <div id="fretboard"></div>
  </div>

  <!-- Legend -->
  <div class="legend-card">
    <div class="legend-heading">Note degrees</div>
    <div id="legend"></div>
  </div>

  <!-- Position navigator (chord mode only) -->
  <div id="position-nav" class="position-nav-card" style="display:none">
    <div class="pos-nav-header">
      <span class="pos-nav-title">Positions</span>
      <div class="pos-nav-controls">
        <button id="pos-prev" class="pos-btn" aria-label="Previous position">&#9664;</button>
        <span id="pos-label" class="pos-label"></span>
        <button id="pos-next" class="pos-btn" aria-label="Next position">&#9654;</button>
        <span id="pos-count" class="pos-count"></span>
      </div>
    </div>
  </div>

  <!-- Voicing gallery (chord mode only) -->
  <div id="voicing-gallery" class="voicing-gallery" style="display:none"></div>

  <!-- Single self-contained bundle: no import/export, works from file:// and HTTP -->
  <script src="bundle.js"></script>
</body>
</html>
