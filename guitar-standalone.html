<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar — Chords & Scales</title>
<style>
/* ============================================================
   Guitar — pure CSS, no external dependencies
   ============================================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:          #1a1a2e;
  --surface:     #16213e;
  --panel:       #0f3460;
  --accent:      #e94560;
  --accent2:     #f5a623;
  --text:        #e0e0e0;
  --text-dim:    #888;
  --border:      #2a3a5c;
  --radius:      10px;
  --shadow:      0 4px 24px rgba(0,0,0,0.5);
  --font-ui:     'Segoe UI', system-ui, sans-serif;
  --font-mono:   'Courier New', monospace;
  --fret-bg:     #f5e6c8;
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 24px 16px 40px;
}

/* ---- Header ---- */

header {
  width: 100%;
  max-width: 900px;
  margin-bottom: 24px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}

header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--accent2);
}

header p.subtitle {
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* ---- Control panel ---- */

.controls {
  width: 100%;
  max-width: 900px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px 32px;
  align-items: flex-end;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 140px;
}

.control-group label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 600;
}

select, input[type="range"] {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 0.9rem;
  font-family: var(--font-ui);
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
  appearance: auto;
}

select:hover, select:focus {
  border-color: var(--accent2);
}

input[type="range"] {
  padding: 4px 0;
  accent-color: var(--accent2);
  width: 100%;
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 4px;
}

.toggle-row input[type="checkbox"] {
  accent-color: var(--accent2);
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.toggle-row label {
  font-size: 0.85rem;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}

/* ---- Display title ---- */

.display-title-wrap {
  width: 100%;
  max-width: 900px;
  margin-bottom: 12px;
}

#display-title {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--accent2);
  letter-spacing: -0.3px;
}

/* ---- Fretboard card ---- */

.fretboard-card {
  width: 100%;
  max-width: 900px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px 16px;
  overflow-x: auto;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  min-height: 220px;   /* prevent flex from collapsing the card */
  flex-shrink: 0;      /* never let the flex column squeeze this */
}

#fretboard {
  display: block;
  width: 100%;
  min-height: 180px;
}

#fretboard svg {
  display: block;
  width: 100%;
  height: auto;
  max-width: 100%;
}

/* ---- Legend ---- */

.legend-card {
  width: 100%;
  max-width: 900px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 20px;
  box-shadow: var(--shadow);
}

.legend-heading {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 10px;
}

#legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 20px;
}

.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 0.88rem;
}

.legend-swatch {
  display: inline-block;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}

.legend-label {
  color: var(--text);
}

/* ---- Position navigator ---- */

.position-nav-card {
  width: 100%;
  max-width: 900px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 20px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

.pos-nav-header {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.pos-nav-title {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 600;
  white-space: nowrap;
}

.pos-nav-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pos-btn {
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 30px;
  height: 30px;
  font-size: 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  line-height: 1;
}

.pos-btn:hover:not(:disabled) {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #000;
}

.pos-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.pos-label {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--accent2);
  min-width: 120px;
  text-align: center;
}

.pos-count {
  font-size: 0.8rem;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ---- Voicing gallery ---- */

.voicing-gallery {
  width: 100%;
  max-width: 900px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
}

.voicing-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 10px 6px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: border-color 0.15s, background 0.15s;
  box-shadow: var(--shadow);
}

.voicing-card:hover {
  border-color: var(--accent2);
  background: var(--panel);
}

.voicing-card.active {
  border-color: var(--accent);
  background: var(--panel);
  box-shadow: 0 0 0 2px rgba(233,69,96,0.3), var(--shadow);
}

.voicing-diagram svg {
  display: block;
  width: 100%;
  height: auto;
}

.voicing-card-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  font-weight: 600;
  font-family: var(--font-mono);
}

/* ---- Responsive ---- */

@media (max-width: 640px) {
  header h1 { font-size: 1.4rem; }
  .controls { padding: 16px; gap: 16px; }
  .fretboard-card { padding: 16px 12px 12px; }
  .voicing-gallery { gap: 8px; }
}

  </style>
  </head>
<body>

  <header>
    <h1>🎸 Guitar</h1>
    <p class="subtitle">Chords &amp; scales on the fretboard</p>
  </header>

  <!-- Control panel -->
  <section class="controls" aria-label="Controls">

    <!-- Mode -->
    <div class="control-group">
      <label for="sel-mode">Mode</label>
      <select id="sel-mode">
        <option value="chord">Chord</option>
        <option value="scale">Scale</option>
      </select>
    </div>

    <!-- Root note -->
    <div class="control-group">
      <label for="sel-root">Root note</label>
      <select id="sel-root"></select>
    </div>

    <!-- Chord selector (visible in chord mode) -->
    <div class="control-group" id="chord-row">
      <label for="sel-chord">Chord type</label>
      <select id="sel-chord"></select>
    </div>

    <!-- Scale selector (visible in scale mode) -->
    <div class="control-group" id="scale-row" style="display:none">
      <label for="sel-scale">Scale type</label>
      <select id="sel-scale"></select>
    </div>

    <!-- Tuning -->
    <div class="control-group">
      <label for="sel-tuning">Tuning</label>
      <select id="sel-tuning"></select>
    </div>

    <!-- Fret range -->
    <div class="control-group">
      <label for="sel-frets">Show up to fret <span id="frets-label">12</span></label>
      <input type="range" id="sel-frets" min="5" max="24" value="12" step="1">
    </div>

    <!-- Flat/sharp toggle -->
    <div class="control-group">
      <label>&nbsp;</label>
      <div class="toggle-row">
        <input type="checkbox" id="toggle-flats">
        <label for="toggle-flats">Use ♭ spellings</label>
      </div>
    </div>

  </section>

  <!-- Title -->
  <div class="display-title-wrap">
    <span id="display-title"></span>
  </div>

  <!-- Fretboard -->
  <div class="fretboard-card">
    <div id="fretboard"></div>
  </div>

  <!-- Legend -->
  <div class="legend-card">
    <div class="legend-heading">Note degrees</div>
    <div id="legend"></div>
  </div>

  <!-- Position navigator (chord mode only) -->
  <div id="position-nav" class="position-nav-card" style="display:none">
    <div class="pos-nav-header">
      <span class="pos-nav-title">Positions</span>
      <div class="pos-nav-controls">
        <button id="pos-prev" class="pos-btn" aria-label="Previous position">&#9664;</button>
        <span id="pos-label" class="pos-label"></span>
        <button id="pos-next" class="pos-btn" aria-label="Next position">&#9654;</button>
        <span id="pos-count" class="pos-count"></span>
      </div>
    </div>
  </div>

  <!-- Voicing gallery (chord mode only) -->
  <div id="voicing-gallery" class="voicing-gallery" style="display:none"></div>

<script>
// js/theory.js
var NOTE_NAMES_SHARP = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
var NOTE_NAMES_FLAT = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
var NOTE_NAME_TO_PC = (() => {
  const map = {};
  NOTE_NAMES_SHARP.forEach((n, i) => {
    map[n] = i;
  });
  NOTE_NAMES_FLAT.forEach((n, i) => {
    map[n] = i;
  });
  map["Cb"] = 11;
  map["Fb"] = 4;
  map["B#"] = 0;
  map["E#"] = 5;
  return map;
})();
function pitchClass(midi) {
  return (midi % 12 + 12) % 12;
}
function pcToName(pc, useFlats = false) {
  return useFlats ? NOTE_NAMES_FLAT[pc] : NOTE_NAMES_SHARP[pc];
}
function nameToPc(name) {
  const pc = NOTE_NAME_TO_PC[name];
  if (pc === undefined)
    throw new Error(`Unknown note name: "${name}"`);
  return pc;
}
function nameToMidi(noteName, oct) {
  return (oct + 1) * 12 + nameToPc(noteName);
}
var INTERVALS = Object.freeze({
  UNISON: 0,
  MINOR_SECOND: 1,
  MAJOR_SECOND: 2,
  MINOR_THIRD: 3,
  MAJOR_THIRD: 4,
  PERFECT_FOURTH: 5,
  TRITONE: 6,
  PERFECT_FIFTH: 7,
  MINOR_SIXTH: 8,
  MAJOR_SIXTH: 9,
  MINOR_SEVENTH: 10,
  MAJOR_SEVENTH: 11,
  OCTAVE: 12

var SCALES = Object.freeze({
  major: [0, 2, 4, 5, 7, 9, 11],
  natural_minor: [0, 2, 3, 5, 7, 8, 10],
  harmonic_minor: [0, 2, 3, 5, 7, 8, 11],
  melodic_minor: [0, 2, 3, 5, 7, 9, 11],
  pentatonic_major: [0, 2, 4, 7, 9],
  pentatonic_minor: [0, 3, 5, 7, 10],
  blues: [0, 3, 5, 6, 7, 10],
  dorian: [0, 2, 3, 5, 7, 9, 10],
  phrygian: [0, 1, 3, 5, 7, 8, 10],
  lydian: [0, 2, 4, 6, 7, 9, 11],
  mixolydian: [0, 2, 4, 5, 7, 9, 10],
  locrian: [0, 1, 3, 5, 6, 8, 10],
  whole_tone: [0, 2, 4, 6, 8, 10],
  diminished_wh: [0, 2, 3, 5, 6, 8, 9, 11],
  diminished_hw: [0, 1, 3, 4, 6, 7, 9, 10]
});
var SCALE_LABELS = Object.freeze({
  major: "Major",
  natural_minor: "Natural Minor",
  harmonic_minor: "Harmonic Minor",
  melodic_minor: "Melodic Minor (asc.)",
  pentatonic_major: "Major Pentatonic",
  pentatonic_minor: "Minor Pentatonic",
  blues: "Blues",
  dorian: "Dorian",
  phrygian: "Phrygian",
  lydian: "Lydian",
  mixolydian: "Mixolydian",
  locrian: "Locrian",
  whole_tone: "Whole Tone",
  diminished_wh: "Diminished (W-H)",
  diminished_hw: "Diminished (H-W)"
});
function getScalePitchClasses(rootPc, scaleName) {
  const intervals = SCALES[scaleName];
  if (!intervals)
    throw new Error(`Unknown scale: "${scaleName}"`);
  return intervals.map((i) => (rootPc + i) % 12);
}
var CHORDS = Object.freeze({
  major: { intervals: [0, 4, 7], degrees: ["1", "3", "5"] },
  minor: { intervals: [0, 3, 7], degrees: ["1", "b3", "5"] },
  diminished: { intervals: [0, 3, 6], degrees: ["1", "b3", "b5"] },
  augmented: { intervals: [0, 4, 8], degrees: ["1", "3", "#5"] },
  sus2: { intervals: [0, 2, 7], degrees: ["1", "2", "5"] },
  sus4: { intervals: [0, 5, 7], degrees: ["1", "4", "5"] },
  dominant7: { intervals: [0, 4, 7, 10], degrees: ["1", "3", "5", "b7"] },
  major7: { intervals: [0, 4, 7, 11], degrees: ["1", "3", "5", "7"] },
  minor7: { intervals: [0, 3, 7, 10], degrees: ["1", "b3", "5", "b7"] },
  minorMajor7: { intervals: [0, 3, 7, 11], degrees: ["1", "b3", "5", "7"] },
  diminished7: { intervals: [0, 3, 6, 9], degrees: ["1", "b3", "b5", "bb7"] },
  halfDim7: { intervals: [0, 3, 6, 10], degrees: ["1", "b3", "b5", "b7"] },
  augmented7: { intervals: [0, 4, 8, 10], degrees: ["1", "3", "#5", "b7"] },
  dominant9: { intervals: [0, 4, 7, 10, 14], degrees: ["1", "3", "5", "b7", "9"] },
  major9: { intervals: [0, 4, 7, 11, 14], degrees: ["1", "3", "5", "7", "9"] },
  minor9: { intervals: [0, 3, 7, 10, 14], degrees: ["1", "b3", "5", "b7", "9"] },
  add9: { intervals: [0, 4, 7, 14], degrees: ["1", "3", "5", "9"] },
  dominant6: { intervals: [0, 4, 7, 9], degrees: ["1", "3", "5", "6"] },
  minor6: { intervals: [0, 3, 7, 9], degrees: ["1", "b3", "5", "6"] },
  power: { intervals: [0, 7], degrees: ["1", "5"] }
});
var CHORD_LABELS = Object.freeze({
  major: "Major",
  minor: "Minor",
  diminished: "Diminished",
  augmented: "Augmented",
  sus2: "Sus2",
  sus4: "Sus4",
  dominant7: "Dominant 7th",
  major7: "Major 7th",
  minor7: "Minor 7th",
  minorMajor7: "Minor/Major 7th",
  diminished7: "Diminished 7th",
  halfDim7: "Half-Diminished 7th",
  augmented7: "Augmented 7th",
  dominant9: "Dominant 9th",
  major9: "Major 9th",
  minor9: "Minor 9th",
  add9: "Add 9",
  dominant6: "Dominant 6th",
  minor6: "Minor 6th",
  power: "Power Chord"
});
function getChordPitchClasses(rootPc, chordName) {
  const chord = CHORDS[chordName];
  if (!chord)
    throw new Error(`Unknown chord: "${chordName}"`);
  return {
    pitchClasses: chord.intervals.map((i) => (rootPc + i) % 12),
    degrees: chord.degrees
  };
}

// js/fretboard.js
function parseTuning(spec) {
  if (!Array.isArray(spec) || spec.length !== 6) {
    throw new Error("Tuning must be an array of 6 values");
  }
  return spec.map((v) => {
    if (typeof v === "number")
      return v;
    if (typeof v === "string") {
      const match = v.match(/^([A-Ga-g][#b]?)(-?\d+)$/);
      if (!match)
        throw new Error(`Cannot parse note: "${v}"`);
      const noteName = match[1].charAt(0).toUpperCase() + match[1].slice(1);
      return nameToMidi(noteName, parseInt(match[2], 10));
    }
    throw new Error(`Invalid tuning value: ${v}`);
  });

var TUNINGS = Object.freeze({
  standard: ["E2", "A2", "D3", "G3", "B3", "E4"],
  drop_d: ["D2", "A2", "D3", "G3", "B3", "E4"],
  open_g: ["D2", "G2", "D3", "G3", "B3", "D4"],
  open_d: ["D2", "A2", "D3", "F#3", "A3", "D4"],
  open_e: ["E2", "B2", "E3", "G#3", "B3", "E4"],
  open_a: ["E2", "A2", "E3", "A3", "C#4", "E4"],
  dadgad: ["D2", "A2", "D3", "G3", "A3", "D4"],
  half_step_down: ["Eb2", "Ab2", "Db3", "Gb3", "Bb3", "Eb4"],
  full_step_down: ["D2", "G2", "C3", "F3", "A3", "D4"],
  drop_c: ["C2", "G2", "C3", "F3", "A3", "D4"]
});
var TUNING_LABELS = Object.freeze({
  standard: "Standard (EADGBe)",
  drop_d: "Drop D (DADGBe)",
  open_g: "Open G (DGDGBd)",
  open_d: "Open D (DADf#ad)",
  open_e: "Open E (EBEg#be)",
  open_a: "Open A (EAEAc#e)",
  dadgad: "DADGAD",
  half_step_down: "Half Step Down (Eb)",
  full_step_down: "Full Step Down (D)",
  drop_c: "Drop C"
});
function buildFretboardMap(tuningSpec, maxFret = 12) {
  const openNotes = parseTuning(tuningSpec);
  return openNotes.map((open) => {
    const frets = [];
    for (let fret = 0;fret <= maxFret; fret++)

function findPositions(targetPcs, tuningSpec, maxFret = 12) {
  const map = buildFretboardMap(tuningSpec, maxFret);
  const positions = [];
  map.forEach((stringFrets, strIdx) => {
    stringFrets.forEach((midi, fret) => {
      const pc = pitchClass(midi);
      const degreeIndex = targetPcs.indexOf(pc);
      if (degreeIndex !== -1) {
        positions.push({ string: strIdx + 1, fret, midi, pc, degreeIndex });

function scoreVoicing(voicing, targetPcs) {
  const active = voicing.filter((v) => v !== null);
  if (active.length === 0)
    return 0;
  const presentPcs = new Set(active.map((v) => v.pc));
  for (const pc of targetPcs) {
    if (!presentPcs.has(pc))
      return 0;
  }
  let score = 100 * targetPcs.length;
  score += active.length * 10;
  const frettedFrets = active.filter((v) => v.fret > 0).map((v) => v.fret);
  if (frettedFrets.length > 0) {
    const span = Math.max(...frettedFrets) - Math.min(...frettedFrets);
    if (span <= 3)
      score += 20;
    else if (span <= 4)
      score += 10;

    score += 20;
  }
  const lowestIdx = voicing.findIndex((v) => v !== null);
  if (lowestIdx !== -1 && voicing[lowestIdx].degreeIndex === 0) {
    score += 30;
  }
  let first = -1, last = -1;
  for (let i = 0;i < voicing.length; i++) {
    if (voicing[i] !== null) {
      if (first === -1)
        first = i;
      last = i;
    }

  let hasGap = false;
  for (let i = first + 1;i < last; i++) {

function findBestVoicingInWindow(targetPcs, tuningSpec, windowStart = 0, windowSize = 4) {

    const hits = [];
    for (let fret = windowStart;fret <= windowStart + windowSize; fret++) {
      if (fret >= stringFrets.length)

      const pc = pitchClass(stringFrets[fret]);
      const di = targetPcs.indexOf(pc);

    return [null, ...hits];

      if (score > bestScore) {
        bestScore = score;
        bestVoicing = [...current];

      return;

    for (const candidate of candidates[strIdx]) {

    const voicing = findBestVoicingInWindow(targetPcs, tuningSpec, ws, windowSize);
    if (!voicing)
      continue;
    const fingerprint = voicing.map((v) => v ? String(v.fret) : "x").join(",");
    if (fingerprint === lastFingerprint)
      continue;
    lastFingerprint = fingerprint;
    const score = scoreVoicing(voicing, targetPcs);
    const cagedShape = identifyCagedShape(voicing);
    results.push({ windowStart: ws, voicing, score, cagedShape });
  }
  return results;
}
function identifyCagedShape(voicing) {
  let rootStrIdx = -1;
  for (let i = 0;i < voicing.length; i++) {
    if (voicing[i] !== null && voicing[i].degreeIndex === 0) {
      rootStrIdx = i;
      break;
    }
  }
  if (rootStrIdx === -1)
    return null;
  if (rootStrIdx === 0)
    return "E";
  if (rootStrIdx === 1 && voicing[0] === null) {
    const inner = [voicing[2], voicing[3], voicing[4]].filter(Boolean);
    if (inner.length >= 2) {
      const allSameFret = inner.every((v) => v.fret === inner[0].fret);
      return allSameFret ? "A" : "C";
    }
    return "A";
  }
  if (rootStrIdx === 2 && voicing[0] === null && voicing[1] === null) {
    return "D";
  }
  return null;
}

// js/renderer.js
var DEFAULTS = {
  maxFret: 12,
  stringCount: 6,
  marginTop: 40,
  marginLeft: 60,
  marginRight: 28,
  marginBottom: 32,
  fretWidth: 56,
  stringSpacing: 28,
  dotRadius: 11,
  nutWidth: 6,
  fretLineWidth: 1.5,
  openDotRadius: 10,
  degreeColors: [
    "#e74c3c",
    "#2980b9",
    "#27ae60",
    "#8e44ad",
    "#f39c12",
    "#16a085",
    "#d35400",
    "#2c3e50",
    "#c0392b",
    "#1abc9c"
  ],
  fretboardColor: "#f5e6c8",
  fretColor: "#8b7355",
  stringColor: "#4a3728",
  nutColor: "#2c1810",
  markerColor: "#d4b896",
  labelColor: "#ffffff"
};
var INLAY_FRETS = [3, 5, 7, 9, 12];
var DOUBLE_INLAY_FRET = 12;
function stringY(s, strCount, cfg) {
  return cfg.marginTop + (strCount - 1 - s) * cfg.stringSpacing;
}
function degreeColor(index, cfg) {
  return cfg.degreeColors[index % cfg.degreeColors.length];
}
function ns(tag) {
  return document.createElementNS("http://www.w3.org/2000/svg", tag);
}
function attrs(el, map) {
  for (const [k, v] of Object.entries(map))
    el.setAttribute(k, v);
  return el;
}
function svgRect(parent, x, y, w, h, extra = {}) {
  parent.appendChild(attrs(ns("rect"), { x, y, width: w, height: h, ...extra }));
}
function svgCircle(parent, cx, cy, r, extra = {}) {
  parent.appendChild(attrs(ns("circle"), { cx, cy, r, ...extra }));
}
function svgLine(parent, x1, y1, x2, y2, extra = {}) {
  parent.appendChild(attrs(ns("line"), { x1, y1, x2, y2, ...extra }));
}
function svgText(parent, x, y, content, extra = {}) {
  const el = attrs(ns("text"), { x, y, ...extra });
  el.textContent = content;
  parent.appendChild(el);
}
function renderFretboard(container, positions, degreeLabels = [], opts = {}) {
  const cfg = Object.assign({}, DEFAULTS, opts);
  const strCount = cfg.stringCount;
  const fretCount = cfg.maxFret;
  const boardWidth = fretCount * cfg.fretWidth;
  const boardHeight = (strCount - 1) * cfg.stringSpacing;
  const svgW = cfg.marginLeft + boardWidth + cfg.marginRight;
  const svgH = cfg.marginTop + boardHeight + cfg.marginBottom;
  const svg = attrs(ns("svg"), {
    viewBox: `0 0 ${svgW} ${svgH}`,
    width: svgW,
    height: svgH,
    preserveAspectRatio: "xMidYMid meet"
  });
  svgRect(svg, cfg.marginLeft, cfg.marginTop, boardWidth, boardHeight, { fill: cfg.fretboardColor, rx: 2 });
  INLAY_FRETS.forEach((f) => {
    if (f > fretCount)
      return;
    const cx = cfg.marginLeft + (f - 0.5) * cfg.fretWidth;
    if (f === DOUBLE_INLAY_FRET) {
      svgCircle(svg, cx, cfg.marginTop + cfg.stringSpacing, 5, { fill: cfg.markerColor });
      svgCircle(svg, cx, cfg.marginTop + boardHeight - cfg.stringSpacing, 5, { fill: cfg.markerColor });
    } else {
      svgCircle(svg, cx, cfg.marginTop + boardHeight / 2, 5, { fill: cfg.markerColor });
    }
  });
  for (let f = 1;f <= fretCount; f++) {
    const x = cfg.marginLeft + f * cfg.fretWidth;
    svgLine(svg, x, cfg.marginTop, x, cfg.marginTop + boardHeight, { stroke: cfg.fretColor, "stroke-width": cfg.fretLineWidth });
  }
  svgRect(svg, cfg.marginLeft - cfg.nutWidth / 2, cfg.marginTop - 2, cfg.nutWidth, boardHeight + 4, { fill: cfg.nutColor, rx: 1 });
  for (let s = 0;s < strCount; s++) {
    const y = stringY(s, strCount, cfg);
    const thickness = 0.6 + (strCount - 1 - s) / (strCount - 1) * 2;
    svgLine(svg, cfg.marginLeft, y, cfg.marginLeft + boardWidth, y, { stroke: cfg.stringColor, "stroke-width": thickness });
  }
  for (let f = 1;f <= fretCount; f++) {
    svgText(svg, cfg.marginLeft + (f - 0.5) * cfg.fretWidth, cfg.marginTop + boardHeight + 20, String(f), {
      "text-anchor": "middle",
      "dominant-baseline": "middle",
      "font-size": "11",
      "font-family": "monospace",
      fill: "#888"
    });
  }
  const openByString = new Map;
  const fretted = [];
  positions.forEach((pos) => {
    if (pos.fret === 0) {
      if (!openByString.has(pos.string))
        openByString.set(pos.string, pos);
    } else {
      fretted.push(pos);
    }
  });
  const activeKeys = cfg.activeKeys instanceof Set ? cfg.activeKeys : new Set;
  const activeRingColor = cfg.activeRingColor ?? "#f5a623";
  openByString.forEach((pos, strNum) => {
    const x = cfg.marginLeft - cfg.nutWidth - cfg.openDotRadius - 4;
    const y = stringY(strNum - 1, strCount, cfg);
    const color = degreeColor(pos.degreeIndex, cfg);
    const active = activeKeys.has(`${pos.string}:${pos.fret}`);
    if (active) {
      svgCircle(svg, x, y, cfg.openDotRadius + 5, { fill: "none", stroke: activeRingColor, "stroke-width": 2.5 });
    }
    svgCircle(svg, x, y, cfg.openDotRadius, { fill: color, stroke: "#fff", "stroke-width": 1.5 });
    svgText(svg, x, y, degreeLabels[pos.degreeIndex] ?? "", {
      "text-anchor": "middle",
      "dominant-baseline": "middle",
      "font-size": "10",
      "font-family": "sans-serif",
      "font-weight": "bold",
      fill: cfg.labelColor
    });
  });
  fretted.forEach((pos) => {
    const x = cfg.marginLeft + (pos.fret - 0.5) * cfg.fretWidth;
    const y = stringY(pos.string - 1, strCount, cfg);
    const color = degreeColor(pos.degreeIndex, cfg);
    const active = activeKeys.has(`${pos.string}:${pos.fret}`);
    if (active) {
      svgCircle(svg, x, y, cfg.dotRadius + 5, { fill: "none", stroke: activeRingColor, "stroke-width": 2.5 });
    }
    svgCircle(svg, x, y, cfg.dotRadius, { fill: color, stroke: "#fff", "stroke-width": 1.5 });
    svgText(svg, x, y, degreeLabels[pos.degreeIndex] ?? "", {
      "text-anchor": "middle",
      "dominant-baseline": "middle",
      "font-size": "11",
      "font-family": "sans-serif",
      "font-weight": "bold",
      fill: cfg.labelColor
    });
  });
  container.innerHTML = "";
  container.appendChild(svg);
}
function renderChordDiagram(container, voicing, degreeLabels = [], opts = {}) {
  const cfg = Object.assign({}, DEFAULTS, opts);
  const STRINGS = 6;
  const FRETS = 4;
  const FW = 26;
  const SS = 15;
  const DR = 7;
  const NW = 5;
  const mTop = 8;
  const mLeft = 20;
  const mRight = 6;
  const mBottom = 16;
  const boardW = FRETS * FW;
  const boardH = (STRINGS - 1) * SS;
  const svgW = mLeft + boardW + mRight;
  const svgH = mTop + boardH + mBottom;
  const strY = (s) => mTop + (STRINGS - 1 - s) * SS;
  let minFret = Infinity;
  for (const v of voicing) {
    if (v !== null && v.fret > 0 && v.fret < minFret)
      minFret = v.fret;
  }
  if (minFret === Infinity)
    minFret = 0;
  const isOpen = minFret <= 1;
  const svg = attrs(ns("svg"), {
    viewBox: `0 0 ${svgW} ${svgH}`,
    preserveAspectRatio: "xMidYMid meet"
  });
  svgRect(svg, mLeft, mTop, boardW, boardH, { fill: cfg.fretboardColor, rx: 1 });
  if (isOpen) {
    svgRect(svg, mLeft - NW / 2, mTop - 1, NW, boardH + 2, { fill: cfg.nutColor, rx: 1 });
  } else {
    svgLine(svg, mLeft, mTop, mLeft, mTop + boardH, { stroke: cfg.fretColor, "stroke-width": 1.5 });
  }
  for (let f = 1;f <= FRETS; f++) {
    const x = mLeft + f * FW;
    svgLine(svg, x, mTop, x, mTop + boardH, { stroke: cfg.fretColor, "stroke-width": 1.5 });
  }
  for (let s = 0;s < STRINGS; s++) {
    const y = strY(s);
    const thickness = 0.5 + (STRINGS - 1 - s) / (STRINGS - 1) * 1.6;
    svgLine(svg, mLeft, y, mLeft + boardW, y, { stroke: cfg.stringColor, "stroke-width": thickness });
  }
  if (!isOpen) {
    svgText(svg, mLeft + FW * 0.5, mTop + boardH + 11, `${minFret}fr`, {
      "text-anchor": "middle",
      "dominant-baseline": "middle",
      "font-size": "9",
      "font-family": "monospace",
      fill: "#888"
    });
  }
  voicing.forEach((v, strIdx) => {
    const x = mLeft - 10;
    const y = strY(strIdx);
    if (v === null) {
      svgText(svg, x, y, "×", {
        "text-anchor": "middle",
        "dominant-baseline": "middle",
        "font-size": "11",
        "font-family": "sans-serif",
        fill: "#777"
      });
    } else if (v.fret === 0) {
      const color = degreeColor(v.degreeIndex, cfg);
      svgCircle(svg, x, y, 6, { fill: color, stroke: "#fff", "stroke-width": 1.2 });
      svgText(svg, x, y, degreeLabels[v.degreeIndex] ?? "", {
        "text-anchor": "middle",
        "dominant-baseline": "middle",
        "font-size": "7",
        "font-family": "sans-serif",
        "font-weight": "bold",
        fill: cfg.labelColor
      });
    }
  });
  voicing.forEach((v, strIdx) => {
    if (v === null || v.fret === 0)
      return;
    const fretPos = v.fret - minFret;
    const x = mLeft + (fretPos + 0.5) * FW;
    const y = strY(strIdx);
    const color = degreeColor(v.degreeIndex, cfg);
    svgCircle(svg, x, y, DR, { fill: color, stroke: "#fff", "stroke-width": 1.5 });
    svgText(svg, x, y, degreeLabels[v.degreeIndex] ?? "", {
      "text-anchor": "middle",
      "dominant-baseline": "middle",
      "font-size": "8",
      "font-family": "sans-serif",
      "font-weight": "bold",
      fill: cfg.labelColor
    });
  });
  container.innerHTML = "";
  container.appendChild(svg);
}
function renderLegend(container, degreeLabels, noteNames = [], opts = {}) {
  const cfg = Object.assign({}, DEFAULTS, opts);
  container.innerHTML = "";
  degreeLabels.forEach((label, i) => {
    const item = document.createElement("span");
    item.className = "legend-item";
    const swatch = document.createElement("span");
    swatch.className = "legend-swatch";
    swatch.style.background = degreeColor(i, cfg);
    const lbl = document.createElement("span");
    lbl.className = "legend-label";
    lbl.textContent = noteNames[i] ? `${label} (${noteNames[i]})` : label;
    item.appendChild(swatch);
    item.appendChild(lbl);
    container.appendChild(item);
  });
}

// js/app.js
var state = {
  mode: "chord",
  rootName: "C",
  chordName: "major",
  scaleName: "major",
  tuningKey: "standard",
  maxFret: 12,
  useFlats: false,
  positionIndex: 0,
  voicings: []
};
function getChordScaleData() {
  const rootPc = nameToPc(state.rootName);
  const tuning = TUNINGS[state.tuningKey];
  let pitchClasses, degrees, displayTitle;
  if (state.mode === "chord") {
    ({ pitchClasses, degrees } = getChordPitchClasses(rootPc, state.chordName));
    displayTitle = `${state.rootName} ${CHORD_LABELS[state.chordName]}`;
  } else {
    pitchClasses = getScalePitchClasses(rootPc, state.scaleName);
    degrees = pitchClasses.map((_, i) => String(i + 1));
    displayTitle = `${state.rootName} ${SCALE_LABELS[state.scaleName]}`;
  }
  return { rootPc, tuning, pitchClasses, degrees, displayTitle };
}
function render() {
  try {
    const { tuning, pitchClasses, degrees, displayTitle } = getChordScaleData();
    const positions = findPositions(pitchClasses, tuning, state.maxFret);
    const noteNames = pitchClasses.map((pc) => pcToName(pc, state.useFlats));
    let activeKeys;
    if (state.mode === "chord" && state.voicings.length > 0) {
      const voicing = state.voicings[state.positionIndex]?.voicing ?? [];
      activeKeys = new Set(voicing.filter(Boolean).map((v) => `${v.string}:${v.fret}`));
    }
    renderFretboard(document.getElementById("fretboard"), positions, degrees, { maxFret: state.maxFret, activeKeys });
    renderLegend(document.getElementById("legend"), degrees, noteNames);
    document.getElementById("display-title").textContent = displayTitle;
  } catch (e) {
    document.getElementById("fretboard").textContent = "render() error: " + e.message + " — " + e.stack;
    console.error("render() failed:", e);
  }
}
function computeVoicings() {
  if (state.mode !== "chord") {
    state.voicings = [];
    return;
  }
  const { pitchClasses, tuning } = getChordScaleData();
  state.voicings = findVoicingsAcrossNeck(pitchClasses, tuning, 22, 4);
  if (state.positionIndex >= state.voicings.length)
    state.positionIndex = 0;
}
function renderPositionNav(scrollToActive = false) {
  const navEl = document.getElementById("position-nav");
  const galleryEl = document.getElementById("voicing-gallery");
  if (state.mode !== "chord") {
    navEl.style.display = "none";
    galleryEl.style.display = "none";
    return;
  }
  navEl.style.display = "";
  galleryEl.style.display = "";
  const { voicings, positionIndex } = state;
  const cur = voicings[positionIndex];
  let label = "No voicings found";
  if (cur) {
    const shape = cur.cagedShape ? `${cur.cagedShape} shape · ` : "";
    label = `${shape}fret ${cur.windowStart}`;
  }
  document.getElementById("pos-label").textContent = label;
  document.getElementById("pos-count").textContent = voicings.length > 0 ? `${positionIndex + 1} / ${voicings.length}` : "";
  document.getElementById("pos-prev").disabled = positionIndex <= 0;
  document.getElementById("pos-next").disabled = positionIndex >= voicings.length - 1;
  const { degrees } = getChordScaleData();
  galleryEl.innerHTML = "";
  voicings.forEach((v, idx) => {
    const card = document.createElement("div");
    card.className = "voicing-card" + (idx === positionIndex ? " active" : "");
    const diagEl = document.createElement("div");
    diagEl.className = "voicing-diagram";
    renderChordDiagram(diagEl, v.voicing, degrees);
    const lbl = document.createElement("div");
    lbl.className = "voicing-card-label";
    lbl.textContent = v.cagedShape ? `${v.cagedShape}  fr${v.windowStart}` : `fr${v.windowStart}`;
    card.appendChild(diagEl);
    card.appendChild(lbl);
    card.addEventListener("click", () => {
      state.positionIndex = idx;
      render();
      renderPositionNav(true);
    });
    galleryEl.appendChild(card);
  });
  if (scrollToActive) {
    const active = galleryEl.querySelector(".voicing-card.active");
    if (active)
      active.scrollIntoView({ block: "nearest", inline: "nearest" });
  }
}
function fullChordRefresh() {
  try {
    computeVoicings();
  } catch (e) {
    console.error("computeVoicings failed:", e);
    state.voicings = [];
  }
  render();
  setTimeout(renderPositionNav, 0);
}
function populateSelect(el, entries, selected) {
  el.innerHTML = "";
  for (const [value, label] of entries) {
    const opt = document.createElement("option");
    opt.value = value;
    opt.textContent = label;
    if (value === selected)
      opt.selected = true;
    el.appendChild(opt);
  }
}
function updateModeUI() {
  document.getElementById("chord-row").style.display = state.mode === "chord" ? "" : "none";
  document.getElementById("scale-row").style.display = state.mode === "scale" ? "" : "none";
}
function init() {
  const elMode = document.getElementById("sel-mode");
  const elRoot = document.getElementById("sel-root");
  const elChord = document.getElementById("sel-chord");
  const elScale = document.getElementById("sel-scale");
  const elTuning = document.getElementById("sel-tuning");
  const elFlats = document.getElementById("toggle-flats");
  const elFrets = document.getElementById("sel-frets");
  const elFretsLabel = document.getElementById("frets-label");
  populateSelect(elRoot, NOTE_NAMES_SHARP.map((n) => [n, n]), state.rootName);
  populateSelect(elChord, Object.keys(CHORDS).map((k) => [k, CHORD_LABELS[k]]), state.chordName);
  populateSelect(elScale, Object.keys(SCALES).map((k) => [k, SCALE_LABELS[k]]), state.scaleName);
  populateSelect(elTuning, Object.keys(TUNINGS).map((k) => [k, TUNING_LABELS[k]]), state.tuningKey);
  elMode.addEventListener("change", () => {
    state.mode = elMode.value;
    state.positionIndex = 0;
    updateModeUI();
    fullChordRefresh();
  });
  elRoot.addEventListener("change", () => {
    state.rootName = elRoot.value;
    state.positionIndex = 0;
    fullChordRefresh();
  });
  elChord.addEventListener("change", () => {
    state.chordName = elChord.value;
    state.positionIndex = 0;
    fullChordRefresh();
  });
  elScale.addEventListener("change", () => {
    state.scaleName = elScale.value;
    render();
  });
  elTuning.addEventListener("change", () => {
    state.tuningKey = elTuning.value;
    state.positionIndex = 0;
    fullChordRefresh();
  });
  elFlats.addEventListener("change", () => {
    state.useFlats = elFlats.checked;
    render();
  });
  elFrets.addEventListener("input", () => {
    state.maxFret = parseInt(elFrets.value, 10);
    elFretsLabel.textContent = state.maxFret;
    render();
  });
  document.getElementById("pos-prev").addEventListener("click", () => {
    if (state.positionIndex > 0) {
      state.positionIndex--;
      render();
      renderPositionNav(true);
    }
  });
  document.getElementById("pos-next").addEventListener("click", () => {
    if (state.positionIndex < state.voicings.length - 1) {
      state.positionIndex++;
      render();
      renderPositionNav(true);
    }
  });
  updateModeUI();
  fullChordRefresh();
}
document.addEventListener("DOMContentLoaded", () => {
  try {
    init();
  } catch (e) {
    document.getElementById("fretboard").textContent = "init() error: " + e.message + " — " + e.stack;
    console.error("init() failed:", e);
  }
});
