<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar — Chords & Scales</title>
<style>
/* ============================================================
   Guitar — minimal light theme
   ============================================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:       #f5e6c8;
  --text:     #000000;
  --text-dim: #555555;
  --accent:   #e74c3c;
  --font-ui:  'Segoe UI', system-ui, sans-serif;
  --font-mono:'Courier New', monospace;
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 24px 16px 80px;
}

/* ---- Header ---- */

header {
  width: 100%;
  max-width: 900px;
  margin-bottom: 24px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}

header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}

header p.subtitle {
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* ---- Control panel ---- */

.controls {
  width: 100%;
  max-width: 900px;
  padding: 20px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 20px 32px;
  align-items: flex-end;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--text);
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 140px;
}

.control-group label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 600;
}

select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--text);
  border-radius: 0;
  padding: 7px 10px;
  font-size: 0.9rem;
  font-family: var(--font-ui);
  cursor: pointer;
  outline: none;
  appearance: auto;
}

input[type="range"] {
  display: block;
  width: 100%;
  padding: 4px 0;
  accent-color: var(--accent);
  cursor: pointer;
  border: none;
  background: transparent;
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 4px;
}

.toggle-row input[type="checkbox"] {
  accent-color: var(--accent);
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.toggle-row label {
  font-size: 0.85rem;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}

/* ---- Display title ---- */

.display-title-wrap {
  width: 100%;
  max-width: 900px;
  margin-bottom: 12px;
}

#display-title {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}

/* ---- Fretboard ---- */

.fretboard-card {
  width: 100%;
  max-width: 900px;
  padding: 24px 0 16px;
  overflow-x: auto;
  margin-bottom: 20px;
  min-height: 220px;
  flex-shrink: 0;
}

#fretboard {
  display: block;
  width: 100%;
  min-height: 180px;
}

#fretboard svg {
  display: block;
  width: 100%;
  height: auto;
  max-width: 100%;
}

/* ---- Legend ---- */

.legend-card {
  width: 100%;
  max-width: 900px;
  padding: 14px 0;
  border-top: 1px solid var(--text);
  border-bottom: 1px solid var(--text);
  margin-bottom: 24px;
}

.legend-heading {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 10px;
}

#legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 20px;
}

.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 0.88rem;
}

.legend-swatch {
  display: inline-block;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid var(--text);
  flex-shrink: 0;
}

.legend-label {
  color: var(--text);
}

/* ---- Position navigator ---- */

.position-nav-card {
  width: 100%;
  max-width: 900px;
  padding: 14px 0;
  margin-bottom: 12px;
}

.pos-nav-header {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.pos-nav-title {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 600;
  white-space: nowrap;
}

.pos-nav-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pos-btn {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--text);
  border-radius: 0;
  width: 30px;
  height: 30px;
  font-size: 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: background 0.1s, color 0.1s;
}

.pos-btn:hover:not(:disabled) {
  background: var(--text);
  color: var(--bg);
}

.pos-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.pos-label {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  min-width: 120px;
  text-align: center;
}

.pos-count {
  font-size: 0.8rem;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ---- Voicing gallery ---- */

.voicing-gallery {
  width: 100%;
  max-width: 900px;
  display: flex;
  flex-wrap: nowrap;
  gap: 12px;
  margin-bottom: 24px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 6px;
  min-height: 290px;
  flex-shrink: 0;
}

.voicing-card {
  flex: 0 0 calc(33.333% - 8px);
  min-width: 0;
  min-height: 250px;
  padding: 10px 10px 6px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  scroll-snap-align: start;
}

.voicing-card.active {
  border: 1px solid var(--text);
}

.voicing-diagram {
  min-height: 200px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.voicing-diagram svg {
  display: block;
  width: 100%;
  height: auto;
}

.voicing-card-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  font-weight: 600;
  font-family: var(--font-mono);
}

/* ---- Responsive ---- */

@media (max-width: 640px) {
  header h1 { font-size: 1.4rem; }
  .controls { padding: 16px 0; gap: 16px; }
}

.app-footer {
  text-align: center;
  padding: 18px 0 14px;
  font-size: 0.72rem;
  color: #999;
  letter-spacing: 0.03em;
}

  </style>
  </head>
<body>

  <header>
    <h1>Guitar</h1>
    <p class="subtitle">Chords &amp; scales on the fretboard</p>
  </header>

  <!-- Control panel -->
  <section class="controls" aria-label="Controls">

    <!-- Mode -->
    <div class="control-group">
      <label for="sel-mode">Mode</label>

        <option value="chord">Chord</option>
        <option value="scale">Scale</option>

    <!-- Root note -->
    <div class="control-group">
      <label for="sel-root">Root note</label>
      <select id="sel-root"></select>
    </div>

    <!-- Chord selector (visible in chord mode) -->
    <div class="control-group" id="chord-row">
      <label for="sel-chord">Chord type</label>
      <select id="sel-chord"></select>

    <div class="control-group" id="scale-row" style="display:none">
      <label for="sel-scale">Scale type</label>
      <select id="sel-scale"></select>
    </div>

    <!-- Inversion / slash chord (chord mode only) -->
    <div class="control-group" id="inversion-row">
      <label for="sel-inversion">Inversion</label>
      <select id="sel-inversion"></select>
    </div>

    <!-- Tuning -->
    <div class="control-group">
      <label for="sel-tuning">Tuning</label>
      <select id="sel-tuning"></select>
    </div>

  </section>

  <!-- Title -->
  <div class="display-title-wrap">
    <span id="display-title"></span>
  </div>

  <!-- Fretboard -->
  <div class="fretboard-card">
    <div id="fretboard"></div>
  </div>

  <!-- Legend -->
  <div class="legend-card">
    <div class="legend-heading">Note degrees</div>
    <div id="legend"></div>
  </div>

  <!-- Position navigator (chord mode only) -->
  <div id="position-nav" class="position-nav-card" style="display:none">

      <span class="pos-nav-title">Positions</span>

        <span id="pos-label" class="pos-label"></span>
        <button id="pos-next" class="pos-btn" aria-label="Next position">&#9654;</button>
        <span id="pos-count" class="pos-count"></span>
      </div>
    </div>
  </div>

  <!-- Voicing gallery (chord mode only) -->
  <div id="voicing-gallery" class="voicing-gallery" style="display:none"></div>

  <!-- Scale position navigator (scale mode only) -->
  <div id="scale-position-nav" class="position-nav-card" style="display:none">
    <div class="pos-nav-header">
      <span class="pos-nav-title">Scale positions</span>
      <div class="pos-nav-controls">
        <button id="scale-pos-prev" class="pos-btn" aria-label="Previous position">&#9664;</button>
        <span id="scale-pos-label" class="pos-label"></span>
        <button id="scale-pos-next" class="pos-btn" aria-label="Next position">&#9654;</button>
        <span id="scale-pos-count" class="pos-count"></span>
      </div>
    </div>
  </div>

  <!-- Scale diagram gallery (scale mode only) -->
  <div id="scale-gallery" class="voicing-gallery" style="display:none"></div>

  <footer class="app-footer">Guitar Chords &amp; Scales · v1.2.0 · 2026-03-02</footer>

      const pos = state.scalePositions[state.scalePositionIndex];
      if (pos)
        activeKeys = new Set(pos.notes.map((n) => `${n.string}:${n.fret}`));
    }
    renderFretboard(document.getElementById("fretboard"), positions, degrees, { maxFret: FRETBOARD_FRETS, activeKeys });
    renderLegend(document.getElementById("legend"), degrees, noteNames);
    document.getElementById("display-title").textContent = displayTitle;
  } catch (e) {
    document.getElementById("fretboard").textContent = "render() error: " + e.message + " — " + e.stack;
    console.error("render() failed:", e);
  }
}
function fixImpossibleVoicing(voicing, requiredPcs, bassPc) {
  const patterns = [
    [5],
    [0],
    [5, 4],
    [0, 1],
    [5, 0],
    [5, 4, 0],
    [5, 0, 1],
    [5, 4, 3]
  ];
  for (const toMute of patterns) {
    const trimmed = voicing.map((v, i) => toMute.includes(i) ? null : v);
    const notes = trimmed.filter((v) => v !== null);
    if (notes.length < 3)
      continue;
    const present = new Set(notes.map((n) => n.pc));
    if (requiredPcs.some((pc) => !present.has(pc)))
      continue;
    if (bassPc !== null) {
      const lowest = trimmed.find((v) => v !== null);
      if (!lowest || lowest.pc !== bassPc)
        continue;
    }
    const f = assignFingering(trimmed);
    if (!f.impossible)
      return trimmed;
  }
  return null;
}
function computeVoicings() {
  if (state.mode !== "chord") {
    state.voicings = [];
    return;
  }
  const { pitchClasses, tuning } = getChordScaleData();
  const bassPc = state.inversion < pitchClasses.length ? pitchClasses[state.inversion] : null;
  const raw = findVoicingsAcrossNeck(pitchClasses, tuning, VOICING_FRETS, 4, bassPc);
  const seen = new Set;
  state.voicings = raw.map((v) => {
    const f = assignFingering(v.voicing);
    if (!f.impossible)
      return v;
    const fixed = fixImpossibleVoicing(v.voicing, pitchClasses, bassPc);
    if (fixed === null)
      return null;
    return { ...v, voicing: fixed, cagedShape: identifyCagedShape(fixed) };
  }).filter(Boolean).filter((v) => {
    const key = v.voicing.map((n) => n === null ? "x" : n.fret).join(",");
    if (seen.has(key))
      return false;
    seen.add(key);
    return true;
  });
  if (state.positionIndex >= state.voicings.length)
    state.positionIndex = 0;
}
function populateInversionSelect() {
  const el = document.getElementById("sel-inversion");
  if (!el)
    return;
  const { pitchClasses } = getChordScaleData();
  const flat = useFlats();
  const ordinals = ["Root pos.", "1st inv.", "2nd inv.", "3rd inv.", "4th inv."];
  el.innerHTML = "";
  pitchClasses.forEach((pc, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i === 0 ? "Root pos." : `${ordinals[i]} (${state.rootName}/${pcToName(pc, flat)})`;
    if (i === state.inversion)
      opt.selected = true;
    el.appendChild(opt);
  });
}
function voicingMinFret(voicing) {
  let m = Infinity;
  for (const n of voicing)
    if (n !== null && n.fret > 0 && n.fret < m)
      m = n.fret;
  return m === Infinity ? 0 : m;
}
function renderPositionNav(scrollToActive = false) {
  const navEl = document.getElementById("position-nav");
  const galleryEl = document.getElementById("voicing-gallery");
  if (state.mode !== "chord") {
    navEl.style.display = "none";
    galleryEl.style.display = "none";
    return;
  }
  navEl.style.display = "";
  galleryEl.style.display = "";
  const { voicings, positionIndex } = state;
  const cur = voicings[positionIndex];
  const label = cur ? `${cur.cagedShape ? cur.cagedShape + " shape · " : ""}fret ${voicingMinFret(cur.voicing)}` : "No voicings found";
  document.getElementById("pos-label").textContent = label;
  document.getElementById("pos-count").textContent = voicings.length > 0 ? `${positionIndex + 1} / ${voicings.length}` : "";
  document.getElementById("pos-prev").disabled = positionIndex <= 0;
  document.getElementById("pos-next").disabled = positionIndex >= voicings.length - 1;
  const { degrees } = getChordScaleData();
  galleryEl.innerHTML = "";
  voicings.forEach((v, idx) => {
    const card = document.createElement("div");
    card.className = "voicing-card" + (idx === positionIndex ? " active" : "");
    const diagEl = document.createElement("div");
    diagEl.className = "voicing-diagram";
    const fingering = assignFingering(v.voicing);
    renderChordDiagram(diagEl, v.voicing, degrees, { fingering });
    const lbl = document.createElement("div");
    lbl.className = "voicing-card-label";
    const mf = voicingMinFret(v.voicing);
    lbl.textContent = v.cagedShape ? `${v.cagedShape}  fr${mf}` : `fr${mf}`;
    card.appendChild(diagEl);
    card.appendChild(lbl);
    card.addEventListener("click", () => {
      state.positionIndex = idx;
      render();
      renderPositionNav(true);
    });
    galleryEl.appendChild(card);
  });
  if (scrollToActive) {
    const active = galleryEl.querySelector(".voicing-card.active");
    if (active)
      active.scrollIntoView({ block: "nearest", inline: "nearest" });
  }
}
function computeScalePositions() {
  if (state.mode !== "scale") {
    state.scalePositions = [];
    return;
  }
  const { pitchClasses, tuning } = getChordScaleData();
  state.scalePositions = findScalePositions(pitchClasses, tuning, VOICING_FRETS);
  if (state.scalePositionIndex >= state.scalePositions.length)
    state.scalePositionIndex = 0;
}
function renderScaleNav(scrollToActive = false) {
  const navEl = document.getElementById("scale-position-nav");
  const galleryEl = document.getElementById("scale-gallery");
  if (state.mode !== "scale") {
    navEl.style.display = "none";
    galleryEl.style.display = "none";
    return;
  }
  navEl.style.display = "";
  galleryEl.style.display = "";
  const { scalePositions, scalePositionIndex } = state;
  const cur = scalePositions[scalePositionIndex];
  document.getElementById("scale-pos-label").textContent = cur ? `fret ${cur.windowStart}` : "No positions found";
  document.getElementById("scale-pos-count").textContent = scalePositions.length > 0 ? `${scalePositionIndex + 1} / ${scalePositions.length}` : "";
  document.getElementById("scale-pos-prev").disabled = scalePositionIndex <= 0;
  document.getElementById("scale-pos-next").disabled = scalePositionIndex >= scalePositions.length - 1;
  galleryEl.innerHTML = "";
  scalePositions.forEach((pos, idx) => {
    const card = document.createElement("div");
    card.className = "voicing-card" + (idx === scalePositionIndex ? " active" : "");
    const diagEl = document.createElement("div");
    diagEl.className = "voicing-diagram";
    renderScaleDiagram(diagEl, pos.notes, pos.windowStart, pos.windowSize);
    const lbl = document.createElement("div");
    lbl.className = "voicing-card-label";
    lbl.textContent = `fr${pos.windowStart}`;
    card.appendChild(diagEl);
    card.appendChild(lbl);
    card.addEventListener("click", () => {
      state.scalePositionIndex = idx;
      render();
      renderScaleNav(true);
    });
    galleryEl.appendChild(card);
  });
  if (scrollToActive) {
    const active = galleryEl.querySelector(".voicing-card.active");
    if (active)
      active.scrollIntoView({ block: "nearest", inline: "nearest" });
  }
}
function fullRefresh() {
  if (state.mode === "chord") {
    try {
      computeVoicings();
    } catch (e) {
      console.error("computeVoicings failed:", e);
      state.voicings = [];
    }
    populateInversionSelect();
  } else {
    try {
      computeScalePositions();
    } catch (e) {
      console.error("computeScalePositions failed:", e);
      state.scalePositions = [];
    }
  }
  render();
  setTimeout(() => {
    renderPositionNav();
    renderScaleNav();
  }, 0);
}
function populateSelect(el, entries, selected) {
  el.innerHTML = "";
  for (const [value, label] of entries) {
    const opt = document.createElement("option");
    opt.value = value;
    opt.textContent = label;
    if (value === selected)
      opt.selected = true;
    el.appendChild(opt);
  }
}
function updateModeUI() {
  const isChord = state.mode === "chord";
  document.getElementById("chord-row").style.display = isChord ? "" : "none";
  document.getElementById("scale-row").style.display = isChord ? "none" : "";
  document.getElementById("inversion-row").style.display = isChord ? "" : "none";
}
function init() {
  const elMode = document.getElementById("sel-mode");
  const elRoot = document.getElementById("sel-root");
  const elChord = document.getElementById("sel-chord");
  const elScale = document.getElementById("sel-scale");
  const elTuning = document.getElementById("sel-tuning");
  const elInversion = document.getElementById("sel-inversion");
  populateSelect(elRoot, NOTE_NAMES_SHARP.map((n) => [n, n]), state.rootName);
  populateSelect(elChord, Object.keys(CHORDS).map((k) => [k, CHORD_LABELS[k]]), state.chordName);
  populateSelect(elScale, Object.keys(SCALES).map((k) => [k, SCALE_LABELS[k]]), state.scaleName);
  populateSelect(elTuning, Object.keys(TUNINGS).map((k) => [k, TUNING_LABELS[k]]), state.tuningKey);
  elMode.addEventListener("change", () => {
    state.mode = elMode.value;
    state.positionIndex = 0;
    state.scalePositionIndex = 0;
    updateModeUI();
    fullRefresh();
  });
  elRoot.addEventListener("change", () => {
    state.rootName = elRoot.value;
    state.inversion = 0;
    state.positionIndex = 0;
    state.scalePositionIndex = 0;
    fullRefresh();
  });
  elChord.addEventListener("change", () => {
    state.chordName = elChord.value;
    state.inversion = 0;
    state.positionIndex = 0;
    fullRefresh();
  });
  elScale.addEventListener("change", () => {
    state.scaleName = elScale.value;
    state.scalePositionIndex = 0;
    fullRefresh();
  });
  elTuning.addEventListener("change", () => {
    state.tuningKey = elTuning.value;
    state.positionIndex = 0;
    state.scalePositionIndex = 0;
    fullRefresh();
  });
  elInversion.addEventListener("change", () => {
    state.inversion = parseInt(elInversion.value, 10);
    state.positionIndex = 0;
    try {
      computeVoicings();
    } catch (e) {
      console.error("computeVoicings failed:", e);
      state.voicings = [];
    }
    render();
    setTimeout(renderPositionNav, 0);
  });
  document.getElementById("pos-prev").addEventListener("click", () => {
    if (state.positionIndex > 0) {
      state.positionIndex--;
      render();
      renderPositionNav(true);
    }
  });
  document.getElementById("pos-next").addEventListener("click", () => {
    if (state.positionIndex < state.voicings.length - 1) {
      state.positionIndex++;
      render();
      renderPositionNav(true);
    }
  });
  document.getElementById("scale-pos-prev").addEventListener("click", () => {
    if (state.scalePositionIndex > 0) {
      state.scalePositionIndex--;
      render();
      renderScaleNav(true);
    }
  });
  document.getElementById("scale-pos-next").addEventListener("click", () => {
    if (state.scalePositionIndex < state.scalePositions.length - 1) {
      state.scalePositionIndex++;
      render();
      renderScaleNav(true);
    }
  });
  updateModeUI();
  fullRefresh();
}
document.addEventListener("DOMContentLoaded", () => {
  try {
    init();
  } catch (e) {
    document.getElementById("fretboard").textContent = "init() error: " + e.message + " — " + e.stack;
    console.error("init() failed:", e);
  }
});

  </script>
